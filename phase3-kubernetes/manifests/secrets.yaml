apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: default
type: Opaque
data:
  # Values are base64 encoded strings
  # DB_PASSWORD = "super_secure_prod_password"
  DB_PASSWORD: c3VwZXJfc2VjdXJlX3Byb2RfcGFzc3dvcmQ=
  
  # APP_KEY = "base64:3452345234523452"
  APP_KEY: YmFzZTY0OjM0NTIzNDUyMzQ1MjM0NTI=

# =========================================================================
# PRODUCTION NOTE: How MNCs Secure Secrets
# =========================================================================
# In a real enterprise production environment, we NEVER commit raw or base64 
# secrets files into Git (GitOps repositories).
# 
# Instead, MNCs use one of the following systems:
# 1. AWS Secrets Manager / Azure Key Vault (Cloud Native Storage)
# 2. External Secrets Operator (ESO): Automatically fetches secrets from AWS
#    Secrets Manager and syncs them as native Kubernetes Secrets inside the cluster.
# 3. HashiCorp Vault: Dynamic injection via Vault Sidecar Agents directly into pods.
# 4. Sealed Secrets (Bitnami): Encrypts K8s secrets using public-key cryptography
#    so they can be safely stored in Git, and decrypts them in the cluster.
# =========================================================================
