name: Infrastructure Pipeline

on:
  push:
    paths:
      - 'terraform/**'
      - '.github/workflows/infra.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Cloud Environment'
        required: true
        default: 'aws'
        type: choice
        options:
          - aws
          - azure

env:
  AWS_REGION: us-east-1
  LOCATION: EastUS

jobs:
  terraform:
    name: Terraform Workflow
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.8.0'

      # AWS Credentials Configuration
      - name: Configure AWS Credentials
        if: ${{ github.event.inputs.environment == 'aws' || (github.event_name == 'push' && contains(github.event.head_commit.message, 'aws')) }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Azure Credentials Configuration
      - name: Log in to Azure
        if: ${{ github.event.inputs.environment == 'azure' || (github.event_name == 'push' && contains(github.event.head_commit.message, 'azure')) }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Set working directory dynamically
      - name: Set Environment Directory
        id: set-dir
        run: |
          if [ "${{ github.event.inputs.environment }}" = "azure" ] || [[ "${{ github.event.head_commit.message }}" =~ "azure" ]]; then
            echo "dir=terraform/azure" >> $GITHUB_OUTPUT
            echo "env_name=azure" >> $GITHUB_OUTPUT
          else
            echo "dir=terraform/aws" >> $GITHUB_OUTPUT
            echo "env_name=aws" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Init
        run: |
          cd ${{ steps.set-dir.outputs.dir }}
          if [ "${{ steps.set-dir.outputs.env_name }}" = "aws" ]; then
            terraform init \
              -backend-config="bucket=weather-platform-terraform-state" \
              -backend-config="key=weather-platform/terraform.tfstate" \
              -backend-config="region=${{ env.AWS_REGION }}"
          else
            terraform init \
              -backend-config="resource_group_name=weather-platform-rg" \
              -backend-config="storage_account_name=weatherplatformtfstate" \
              -backend-config="container_name=terraform-state" \
              -backend-config="key=weather-platform/terraform.tfstate"
          fi

      - name: Terraform Validate
        run: |
          cd ${{ steps.set-dir.outputs.dir }}
          terraform validate

      - name: Terraform Plan
        run: |
          cd ${{ steps.set-dir.outputs.dir }}
          terraform plan -var="groq_api_key=${{ secrets.GROQ_API_KEY }}" -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: |
          cd ${{ steps.set-dir.outputs.dir }}
          terraform apply -auto-approve tfplan

      - name: Run Verification Script
        if: github.ref == 'refs/heads/main'
        run: |
          chmod +x scripts/bootstrap/07-verify.sh
          ./scripts/bootstrap/07-verify.sh
