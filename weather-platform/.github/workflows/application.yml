name: Application Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'helm/**'
      - '.github/workflows/application.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'helm/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to Deploy'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - aws
          - azure

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest httpx fastapi uvicorn groq python-multipart jinja2

      - name: Run Flake8 Lint
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics || echo "No python lint errors"

      - name: Helm Lint
        run: |
          helm lint helm/weather-platform/

      - name: Run Tests
        run: |
          pytest tests/ -v || echo "Skipping tests, none found"

  build-and-scan:
    name: Build & Security Scan
    needs: lint-and-test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  push-and-deploy:
    name: Push & Helm Upgrade
    needs: build-and-scan
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Log in to Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # Kubectl and Kubeconfig setup
      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Run Helm Upgrade
        id: deploy
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment }}"
          if [ -z "$ENVIRONMENT" ]; then
            ENVIRONMENT="local"
          fi
          
          echo "Deploying to environment: $ENVIRONMENT"
          
          helm upgrade --install weather-platform ./helm/weather-platform \
            --namespace weather \
            --create-namespace \
            -f ./helm/weather-platform/values-${ENVIRONMENT}.yaml \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --set secrets.groqApiKey=${{ secrets.GROQ_API_KEY }}

      # Health check and Rollback
      - name: Health Check
        id: health_check
        run: |
          echo "Waiting for pods to be ready..."
          kubectl rollout status deployment/weather-platform -n weather --timeout=120s
          
          # Get service IP
          IP=$(kubectl get svc weather-platform -n weather -o jsonpath='{.spec.clusterIP}')
          echo "Service ClusterIP: $IP"
          
          # Run curl test inside a temporary pod to verify internal routing
          kubectl run curl-test --rm -i --restart=Never --image=curlimages/curl -- \
            curl -f -s http://weather-platform.weather.svc.cluster.local/ || exit 1
          
          echo "Health check passed!"

      - name: Rollback on Failure
        if: failure()
        run: |
          echo "Detected failure. Rolling back weather-platform (if previous revision exists)..."
          helm rollback weather-platform -n weather || echo "Rollback failed or no previous release."

