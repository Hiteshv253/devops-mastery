apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: weather-platform
  namespace: argocd
spec:
  project: default
  source:
    # Point to your DevOps git repository
    repoURL: 'https://github.com/Hiteshv253/devops-mastery.git'
    targetRevision: HEAD
    path: weather-platform/helm/weather-platform
    helm:
      valueFiles:
        - values-local.yaml
      parameters:
        - name: image.repository
          value: weather-platform
        - name: image.tag
          value: latest
        - name: image.pullPolicy
          value: Never
        - name: secrets.groqApiKey
          value: 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
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: weather
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
