apiVersion: apps/v1
kind: Deployment

metadata:
  name: weather-app
  namespace: weather

spec:
  replicas: 2

  selector:
    matchLabels:
      app: weather-app

  template:
    metadata:
      labels:
        app: weather-app

    spec:
      containers:
      - name: weather-app

        image: docker.io/library/weather-platform:latest

        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8000