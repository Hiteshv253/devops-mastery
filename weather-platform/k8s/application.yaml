apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: weather-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Hiteshv253/devops-mastery.git
    targetRevision: HEAD
    path: weather-platform/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: weather

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
