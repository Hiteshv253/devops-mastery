<!DOCTYPE html>
<html>
<head>
    <title>Weather Platform</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        body {
            background: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            background: white;
            border-right: 1px solid #ddd;
            padding: 25px;
        }

        .main-chat {
            height: 100vh;
            background: #f8fafc;
        }

        .chat-body {
            height: 55vh;
            overflow-y: auto;
        }

        .weather-card {
            background: #eff6ff;
            border-radius: 15px;
            padding: 20px;
        }

        textarea {
            resize: none;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Left Side -->
            <div class="col-md-3 sidebar">
                <h2 class="mb-4">🌤 Weather Platform</h2>
                <select class="form-select mb-3" id="city">
                    <option>Vadodara</option>
                    <option>Ahmedabad</option>
                    <option>Delhi</option>
                    <option>Mumbai</option>
                </select>
                <button class="btn btn-primary w-100" onclick="loadWeather()">Get Weather</button>
                <div class="weather-card mt-4" id="result"></div>
            </div>

            <!-- Right Side -->
            <div class="col-md-9 main-chat">
                <div class="p-4 border-bottom bg-white">
                    <h2>🤖 DevOps AI Assistant</h2>
                </div>
                <div class="p-4 chat-body">
                    <div id="answer">Welcome to DevOps AI Assistant.</div>
                </div>

                <div class="p-4 bg-white border-top">
                    <textarea class="form-control" rows="4" id="question"
                        placeholder="Ask about Docker, Kubernetes, Terraform, AWS..."></textarea>
                    <div class="row mt-3">
                        <div class="col-md-9">
                            <input type="file" class="form-control" id="file">
                        </div>
                        <div class="col-md-4">
                            <button class="btn btn-success w-100" onclick="askAI()">
                                Ask AI
                            </button>
                        </div>

                        <div class="col-md-4">
                            <button class="btn btn-danger w-100" onclick="stopAI()">
                                Stop
                            </button>
                        </div>

                        <div class="col-md-4">
                            <button class="btn btn-secondary w-100" onclick="resetChat()">
                                Reset
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function stopAI() {
            if (controller) {
                controller.abort();
                document.getElementById("answer")
                    .innerHTML +=
                    `
            <div class="alert alert-danger">
                Response cancelled.
            </div>
            `;
            }
        }
        function resetChat() {
            document.getElementById("answer")
                .innerHTML =
                `
        <div class="alert alert-primary">
            Welcome to DevOps AI Assistant.
        </div>
        `;
            document.getElementById("question").value = "";
            document.getElementById("file").value = "";
        }
        async function askAI() {
            let question = document.getElementById("question").value;
            let file = document.getElementById("file").files[0];
            let formData = new FormData();
            formData.append("question", question);
            if (file) {
                formData.append("file", file);
            }
            document.getElementById("answer")
                .innerHTML +=
                `
        <div class="alert alert-secondary">
            <b>You:</b><br>
            ${question}
        </div>
        <div class="alert alert-warning">
            Thinking...
        </div>
        `;
            let response =
                await fetch(
                    "/api/chat",
                    {
                        method: "POST",
                        body: formData
                    }
                );
            let data = await response.json();
            document.getElementById("answer")
                .innerHTML +=
                `
        <div class="alert alert-success">
            <b>AI:</b><br>
             ${marked.parse(data.answer)}
        </div>
        `;
            document.getElementById("question").value = "";
        }
    </script>
    <script>
        async function loadWeather() {
            let city = document.getElementById("city").value;
            let response = await fetch("/api/weather?city=" + city);
            let data = await response.json();
            document.getElementById("result").innerHTML = `
                <h3>${data.city}</h3>
                <p>Temperature : ${data.temperature} °C</p>
                <p>Wind Speed : ${data.windspeed} km/h</p>
                <p>Weather Code : ${data.weathercode}</p>
            `;
        }
    </script>
</body>
</html>
