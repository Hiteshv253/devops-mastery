name: Multi-Environment EC2 Deployment Pipeline

on:
  push:
    branches:
      - main     # Production branch
      - develop  # Development branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # ==========================================
      # 1. SIMULATED BUILD & LINT STEPS
      # ==========================================
      - name: Build Application
        run: |
          echo "Building the application artifacts..."
          # Example: npm install && npm run build (or Composer build steps)
          mkdir -p dist
          cp -r phase2-docker/app/* dist/

      # ==========================================
      # 2. DYNAMIC ENVIRONMENT ROUTING (DEV vs PROD)
      # ==========================================
      - name: Set target EC2 environments
        id: set-env
        run: |
          if [[ $GITHUB_REF == refs/heads/main ]]; then
            echo "ENV_NAME=production" >> $GITHUB_OUTPUT
            echo "HOST=${{ secrets.PROD_EC2_IP }}" >> $GITHUB_OUTPUT
            echo "APP_PORT=80" >> $GITHUB_OUTPUT
          else
            echo "ENV_NAME=development" >> $GITHUB_OUTPUT
            echo "HOST=${{ secrets.DEV_EC2_IP }}" >> $GITHUB_OUTPUT
            echo "APP_PORT=8080" >> $GITHUB_OUTPUT
          fi

      # ==========================================
      # 3. SECURE SSH DEPLOY TO TARGET EC2
      # ==========================================
      - name: Copy files to Target EC2 Server via SFTP/Rsync
        uses: appleboy/scp-action@master
        with:
          host: ${{ steps.set-env.outputs.HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/home/ec2-user/app"
          strip_components: 1

      - name: Execute Remote SSH Commands to run the App
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.set-env.outputs.HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "Connected to ${{ steps.set-env.outputs.ENV_NAME }} server."
            cd /home/ec2-user/app
            
            # Start/Restart local docker container running the app
            docker stop my-app || true
            docker rm my-app || true
            
            # Run the container matching the environment port (80 for prod, 8080 for dev)
            docker run -d --name my-app \
              -p ${{ steps.set-env.outputs.APP_PORT }}:80 \
              -v /home/ec2-user/app:/usr/share/nginx/html \
              nginx:alpine
            
            echo "Deployment completed on port ${{ steps.set-env.outputs.APP_PORT }}!"
