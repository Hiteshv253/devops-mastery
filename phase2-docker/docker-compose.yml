version: '3.8'

services:
  # PHP-FPM Application Server (built from our multi-stage Dockerfile)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops_laravel_app
    restart: unless-stopped
    environment:
      APP_ENV: local
      DB_HOST: db
      DB_DATABASE: devops_db
      DB_USERNAME: devops_user
      DB_PASSWORD: secure_password
      REDIS_HOST: cache
    volumes:
      - ./app:/var/www/html
    networks:
      - app-network
    depends_on:
      - db
      - cache

  # Nginx Web Server serving static assets and proxying requests to PHP-FPM
  web:
    image: nginx:alpine
    container_name: devops_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./nginx.compose.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - app

  # MySQL Database Server
  db:
    image: mysql:8.0
    container_name: devops_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: devops_db
      MYSQL_USER: devops_user
      MYSQL_PASSWORD: secure_password
      MYSQL_ROOT_PASSWORD: root_secure_password
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network
    ports:
      - "3306:3306"

  # Redis Cache Server
  cache:
    image: redis:alpine
    container_name: devops_redis
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "6379:6379"

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
    driver: local
